<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTOR2 Visualizer</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div>
                <h1>BTOR2 Visualizer</h1>
                <span class="subtitle">Interactive graph viewer for BTOR2 hardware models</span>
            </div>
        </header>

        <!-- Left Panel -->
        <aside class="left-panel">
            <div class="panel-section">
                <h3>Load Model</h3>
                <div class="btn-group">
                    <button class="btn btn-primary" id="btn-upload">&#128194; Upload</button>
                    <button class="btn" id="btn-paste">&#128203; Paste</button>
                    <button class="btn" id="btn-example">&#9889; Example</button>
                </div>
                <input type="file" id="file-input" accept=".btor2,.btor,.txt">
            </div>

            <div class="panel-section">
                <h3>Filters</h3>
                <div class="filter-row">
                    <input type="checkbox" id="filter-sorts" checked>
                    <label for="filter-sorts">Hide sort nodes</label>
                </div>
                <div class="filter-row">
                    <input type="checkbox" id="filter-consts">
                    <label for="filter-consts">Hide constants</label>
                </div>
            </div>

            <div class="panel-section">
                <h3>Search</h3>
                <div class="search-row">
                    <input type="text" id="search-input" placeholder="nid, op, or name...">
                    <button class="btn" id="btn-search">&#128269;</button>
                </div>
            </div>

            <div class="panel-section" style="flex-shrink: 0;">
                <h3>Nodes</h3>
            </div>
            <div class="node-list-container" id="node-list">
                <p class="placeholder">Load a model to see nodes</p>
            </div>
        </aside>

        <!-- Graph Canvas -->
        <main class="graph-area">
            <div id="cy"></div>
            <div class="toolbar">
                <button class="btn" id="btn-zoom-in" title="Zoom in">+</button>
                <button class="btn" id="btn-zoom-out" title="Zoom out">&minus;</button>
                <button class="btn" id="btn-fit" title="Fit graph">Fit</button>
                <button class="btn" id="btn-clear-highlight" title="Clear highlights">Clear</button>
            </div>
        </main>

        <!-- Right Panel -->
        <aside class="right-panel">
            <div class="panel-section" style="flex-shrink: 0;">
                <h3>Node Details</h3>
            </div>
            <div class="detail-panel" id="detail-content">
                <p class="placeholder">Click a node to see details</p>
            </div>

            <div class="stats-panel">
                <h3 style="font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 8px;">Statistics</h3>
                <div id="stats-content">
                    <p class="placeholder">No model loaded</p>
                </div>
            </div>
        </aside>

        <!-- Status Bar -->
        <footer class="status-bar" id="status-bar">
            Ready
        </footer>
    </div>

    <!-- Paste Overlay -->
    <div class="paste-overlay hidden" id="paste-overlay">
        <div class="paste-dialog">
            <h3>Paste BTOR2</h3>
            <textarea id="paste-textarea" placeholder="Paste BTOR2 content here..."></textarea>
            <div class="btn-group">
                <button class="btn" id="btn-paste-cancel">Cancel</button>
                <button class="btn btn-primary" id="btn-paste-confirm">Load</button>
            </div>
        </div>
    </div>

    <!-- Dependencies (CDN) -->
    <script src="https://unpkg.com/cytoscape@3.30.4/dist/cytoscape.min.js"></script>
    <script src="https://unpkg.com/dagre@0.8.5/dist/dagre.min.js"></script>
    <script src="https://unpkg.com/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>

    <!-- App Scripts -->
    <script src="js/parser.js"></script>
    <script src="js/graph.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
